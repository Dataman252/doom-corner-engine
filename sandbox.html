<!DOCTYPE html>
<html>
<head>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  #game-container { width: 100%; height: 100%; }
  canvas { max-width: 100% !important; max-height: 100% !important; object-fit: contain !important; margin: auto !important; display: block !important; }
</style>
<script>
  const mockStorage = { _data: {}, setItem: function(id, val) { this._data[id]=String(val); }, getItem: function(id) { return this._data[id]||null; }, removeItem: function(id) { delete this._data[id]; }, clear: function() { this._data={}; } };
  Object.defineProperty(window, 'localStorage', { value: mockStorage, writable: true });
  Object.defineProperty(window, 'sessionStorage', { value: mockStorage, writable: true });
  Object.defineProperty(window, 'indexedDB', { value: null, writable: true });
</script>
<script src="https://dataman252.github.io/doom-corner-engine/emulatorjs/emulator.min.js"></script>
</head>
<body>
<div id="game-container"></div>
<script src="sandbox.js"></script>
</body>
</html>
